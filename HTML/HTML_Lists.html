<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists</title>
</head>
<body>

    <h1>HTML Lists Example</h1>

    <h2>Ordered List</h2>
<!-- Type attribute : 1, a, A, i, I -->
    <ol >
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h2>Unordered List</h2>
<!-- Type attribute : disc, circle, square -->
    <ul>
        <li>Java</li>
        <li>Python</li>
        <li>C++</li>
    </ul>

    <h2>Description List</h2>

    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets .</dd>

        <dt>PHP</dt>
        <dd>Personal Home Page.</dd>
    </dl>

</body>
</html>
