<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Paragraph Example</title>
</head>
<body>

    <h1>Welcome to My Website</h1>
    
    <p>This is the first paragraph. Web browsers automatically add a small blank space above and below this text to separate it from the heading and the next paragraph.</p>
    
    <p>This is the second paragraph. You can add as many paragraphs as you need to organize your content logically.</p>

</body>
</html>
