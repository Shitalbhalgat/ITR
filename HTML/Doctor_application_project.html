<!DOCTYPE html>
<html>
<head>
    <title>Doctor Appointment Form</title>
</head>
<body>

    <h1>Doctor Appointment Form</h1>

    <form action="" method="post">

        <label>Patient Name:</label><br>
        <input type="text" name="pname" required>
        <br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required>
        <br><br>

        <label>Age:</label><br>
        <input type="number" name="age" min="1" max="120">
        <br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <br><br>

        <label>Select Doctor:</label><br>
        <select name="doctor">
            <option>Dr. Sharma (Cardiologist)</option>
            <option>Dr. Patil (Dentist)</option>
            <option>Dr. Joshi (General Physician)</option>
        </select>
        <br><br>

        <label>Appointment Date:</label><br>
        <input type="date" name="date">
        <br><br>

        <label>Appointment Time:</label><br>
        <input type="time" name="time">
        <br><br>

        <label>Symptoms:</label><br>
        <textarea rows="4" cols="30"
                  placeholder="Describe your symptoms"></textarea>
        <br><br>

        <input type="submit" value="Book Appointment">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
