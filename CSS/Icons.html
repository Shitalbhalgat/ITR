<!DOCTYPE html>
<html>

<head>
    <title>Font Awesome Icons Demo</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: darkblue;
        }

        .icon-box {
            margin-top: 30px;
        }

        .icon-box i {
            font-size: 50px;
            margin: 20px;
            transition: 0.5s;
            cursor: pointer;
        }

        /* Different Colors */
        .fa-house {
            color: blue;
        }

        .fa-user {
            color: green;
        }

        .fa-phone {
            color: red;
        }

        .fa-envelope {
            color: orange;
        }

        .fa-star {
            color: gold;
        }

        .fa-cart-shopping {
            color: purple;
        }

        .fa-location-dot {
            color: brown;
        }

        .fa-calendar-days {
            color: teal;
        }

        .fa-camera {
            color: gray;
        }

        .fa-facebook {
            color: #1877F2;
        }

        .fa-instagram {
            color: #E4405F;
        }

        .fa-youtube {
            color: red;
        }

        /* Hover Effect */

        .icon-box i:hover {

            transform: scale(1.4);

        }
    </style>
</head>

<body>

    <h1>CSS Icons Demo</h1>

    <div class="icon-box">

        <i class="fa-solid fa-house"></i>

        <i class="fa-solid fa-user"></i>

        <i class="fa-solid fa-phone"></i>

        <i class="fa-solid fa-envelope"></i>

        <i class="fa-solid fa-star"></i>

        <i class="fa-solid fa-cart-shopping"></i>

        <i class="fa-solid fa-location-dot"></i>

        <i class="fa-solid fa-calendar-days"></i>

        <i class="fa-solid fa-camera"></i>

        <i class="fa-brands fa-facebook"></i>

        <i class="fa-brands fa-instagram"></i>

        <i class="fa-brands fa-youtube"></i>

    </div>

</body>

</html>
