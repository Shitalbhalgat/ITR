<!DOCTYPE html>
<html>
<head>
    <title>CSS Types and Selectors Demo</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>

        /* Universal Selector */
        *{
            font-family: Arial;
        }

        /* Element Selector */
        h2{
            color: blue;
        }

        /* Class Selector */
        .course{
            color: green;
            font-size:20px;
        }

        /* ID Selector */
        #college{
            background-color: yellow;
        }

        /* Group Selector */
        h3,p{
            color: brown;
        }

    </style>

</head>

<body>

    <h1 style="color:red;">
        CSS Complete Example
    </h1>

    <hr>

    <h2>Welcome to CSS Tutorial</h2>

    <p>
        CSS is used to design webpages.
    </p>

    <p class="course">
        Course : Full Stack Development
    </p>

    <p class="course">
        Subject : HTML & CSS
    </p>

    <h3 id="college">
        ABC College of Engineering
    </h3>

    <h4>
        This heading is styled using External CSS.
    </h4>

    <button>
        Click Me
    </button>

</body>
</html>
