<!-- The margin property is used to create space outside the border of an HTML element.
     It separates one element from another.

Margin Properties
Property	   Description
margin	        Sets margin on all four sides
margin-top	    Top margin
margin-right	Right margin
margin-bottom	Bottom margin
margin-left 	Left margin 

-->
<!DOCTYPE html>
<html>
<head>
    <title>CSS_Margin </title>
<style>

body{
     font-family:Arial;

}

.box1{

    border:3px solid blue;

    margin:30px;

}

.box2{

    border:3px solid green;

    margin-top:40px;

    margin-left:60px;

}

.box3{

    border:3px solid red;

    width:250px;

    margin:auto;

}

</style>

</head>

<body>

<div class="box1">

First Box

</div>

<div class="box2">

    Second Box

</div>

<div class="box3">

Centered Box

</div>

</body>

</html>
