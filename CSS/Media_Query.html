<!-- 1)A Media Query is used to apply different CSS styles based on the screen size or device width.
2)A Media Query allows a webpage to automatically change its layout according to the screen size.
Syntax: @media (condition) {
    CSS Code
}

3)@media(max-width:600px) :Apply the CSS only when the screen width is 600px or less.
4)@media(min-width:600px) : Apply the CSS only when the screen width is 600px or more. -->

<!DOCTYPE html>
<html>
<head>
<title>Media Query Example</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

        body{
            background:lightblue;
        }
        h1{
            font-size:40px;
            }
        .container{
            display:flex;
            justify-content:space-around;
            margin-top:50px;
        }
        
        .box{
            flex:1;/* It makes all flex items share the available space equally. (flex-shrink, flex-grow, flex-basis) */
            height:100px;
            background:lightblue;
            border:2px solid black;
            text-align:center;
            line-height:100px;
            }
             @media(max-width:600px){
                    body{
                        background:orange;
                    }
                    h1{
                        font-size:20px;
                    }
                    .container{
                        flex-direction:column;

                    }
                    .box{
                        background:orange;
                    }
        }
</style>


</head>

<body>

    <h1>Media Query Example</h1>

    <p>Resize the browser window.</p>

    <div class="container">

        <div class="box">Box 1</div>

        <div class="box">Box 2</div>

        <div class="box">Box 3</div>

    </div>
</body>

</html>
