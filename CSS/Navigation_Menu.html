<!DOCTYPE html>
<html>
<head>

    <title>Navigation_Menu</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
        }

        nav{

            background-color:#2c3e50;
            text-align:center;
            padding:15px;

        }

        nav a{

            display:inline-block;
            width:120px;
            padding:12px;
            color:white;
            text-decoration:none;
            border:2px solid white;
            border-radius:5px;
            margin:5px;
            background-color:#34495e;

        }

        nav a:hover{

            background-color:#1abc9c;
            color:black;

        }

        h1{

            text-align:center;
            color:darkblue;

        }

        p{

            text-align:center;

        }

    </style>

</head>

<body>

<nav>

    <a href="#">Home</a>

    <a href="#">About</a>

    <a href="#">Courses</a>

    <a href="#">Gallery</a>

    <a href="#">Contact</a

</nav>

<h1>Welcome to ABC Institute</h1>

<p>
This is a simple navigation menu created using HTML and CSS.
</p>

</body>
</html>
