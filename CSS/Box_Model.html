<!-- The CSS Box Model describes how the browser calculates the size of every HTML element. 
 It consists of four parts: Content
                            Padding
                            Border
                            Margin
Components of the Box Model
Component	   Description
Content	        The actual text, image, or other content inside the element
Padding	        Space between the content and the border
Border	        The line surrounding the padding and content
Margin	         Space outside the border that separates elements -->
<!DOCTYPE html>
<html>
<head>
    <title>Box Model</title>

<style>

div{

    width:300px;

    padding:20px;

    border:5px solid blue;

    margin:30px;

    background-color:lightyellow;
/* 
    box-sizing:border-box; */

}

</style>
</head>
<body>

            <div>

            This is a CSS Box Model Example.

            </div>
            <div>
            This is another CSS Box Model Example.
            </div>
</body>
</html>
