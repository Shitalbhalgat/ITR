<!DOCTYPE html>
<html>
<head>

<title>CSS Borders</title>

<style>

body{

    font-family:Arial;

}

h1{
    border-style:solid;
    border-width:3px;
    border-color:red;

}

h2{

    border:3px dashed green;

}

p{

    border:2px dotted red;

}

div{

    border:5px double purple;

    padding:20px;

}

button{

    border:3px solid black;

    border-radius:15px;

    padding:10px;

}

img{

    border:4px solid orange;

    border-radius:50%;

}

</style>

</head>

<body>

<h1>Solid Border</h1>

<h2>Dashed Border</h2>

<p>Dotted Border Example</p>

<div>

This is a box with a double border.

</div>

<br>

<button>Login</button>

<br><br>

<img src="profile.jpg" width="150">

</body>
</html>
